<html lang="th">
<head>
<meta charset="UTF-8">

<title>CVC Phonics — วิดีโอสอน</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body {}
.app{padding:1rem;max-width:720px;margin:0 auto;}
.mini-banner{width:100%;border-radius:16px;overflow:hidden;margin-bottom:1rem;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.mini-banner img{width:100%;height:auto;display:block;}
.header{text-align:center;background:linear-gradient(135deg,#FF4757,#C0000A);border-radius:24px;padding:1rem;margin-bottom:1rem;box-shadow:0 6px 0 #8B0000;}
.header h1{font-size:22px;font-weight:900;color:#fff;}
.header p{font-size:12px;color:rgba(255,255,255,.9);font-weight:700;margin-top:3px;}













.tips{background:rgba(255,255,255,.6);border-radius:16px;padding:1rem;margin-bottom:1rem;border:2px solid rgba(255,255,255,.8);}
.tips-title{font-size:13px;font-weight:800;color:#7A5500;margin-bottom:8px;}
.tip-item{font-size:12px;color:#555;font-weight:600;margin-bottom:5px;display:flex;gap:6px;}
.home-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:50px;border:3px solid #FFD700;background:linear-gradient(135deg,#fff,#FFFBE6);color:#C0000A;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 0 #B8860B;transition:all .18s;}
.home-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #B8860B;}
.krujah-logo{position:fixed;bottom:20px;right:20px;width:64px;height:64px;border-radius:50%;border:3px solid #FFD700;box-shadow:0 4px 16px rgba(0,0,0,.25),0 0 0 5px rgba(255,215,0,.3);z-index:999;cursor:pointer;overflow:hidden;animation:floatLogo 3s ease-in-out infinite;}
.krujah-logo img{width:100%;height:100%;object-fit:cover;}
@keyframes floatLogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}



.thumb-wrap:hover 


.thumb-wrap:hover 


.yt-btn:hover { transform:translateY(-2px); box-shadow:0 6px 0 #CC0000; }

/* Mobile video optimization */
@media(max-width:600px){
  .app { padding: .5rem !important; }
  .video-card { padding: .5rem !important; border-radius: 14px; }
  .video-wrap { border-radius: 8px; }
  .mini-banner { border-radius: 10px; margin-bottom: .75rem; }
  .header { border-radius: 16px; padding: .75rem; margin-bottom: .75rem; }
  .header h1 { font-size: 18px; }
  
  
  .tips { padding: .75rem; margin-bottom: .75rem; }
  .home-btn { padding: 10px; font-size: 13px; }
}

@media(max-width:600px){
  .app { padding:.5rem !important; }
  .video-card { padding:.4rem !important; border-radius:14px; }
  .video-wrap { 
    padding-top:0 !important; 
    height:55vw !important;
    border-radius:8px;
  }
  .mini-banner { border-radius:10px; margin-bottom:.5rem; }
  .header { border-radius:16px; padding:.65rem; margin-bottom:.65rem; }
  .header h1 { font-size:17px; }
  .header p { font-size:11px; }
  
  
  
  
  .tips { padding:.65rem; margin-bottom:.65rem; }
  .tip-item { font-size:11px; }
  .home-btn { padding:10px; font-size:12px; }
  .video-title { font-size:13px; margin-bottom:.65rem; }
}

.video-card { background:#fff; border-radius:20px; border:3px solid #2E86FF; box-shadow:0 5px 0 #0C447C; padding:.5rem; margin-bottom:1rem; }
.video-title { font-size:15px; font-weight:800; color:#185FA5; margin-bottom:.75rem; text-align:center; }

/* Thumbnail + play button */
.thumb-container { 
  position:relative; width:100%; border-radius:10px; 
  overflow:hidden; cursor:pointer; background:#000;
  aspect-ratio:16/9;
}
.thumb-container img { 
  width:100%; height:100%; 
  object-fit:cover; display:block; 
  opacity:0.9; transition:opacity .2s;
}

.thumb-container:hover img { opacity:0.75; }
.play-btn { 
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:72px; height:72px; border-radius:50%;
  background:rgba(46,134,255,0.92);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  transition:transform .2s;
}
.thumb-container:hover .play-btn { transform:translate(-50%,-50%) scale(1.1); }
.play-icon { font-size:30px; color:#fff; margin-left:5px; }

/* Modal video */
.video-modal {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,0.95);
  flex-direction:column; align-items:center; justify-content:center;
}
.video-modal.open { display:flex; }
.modal-close {
  position:absolute; top:16px; right:16px;
  width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.2); border:none;
  color:#fff; font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.modal-iframe-wrap {
  width:98vw; max-width:1000px;
  position:relative; padding-top:56.25%;
}
.modal-iframe-wrap iframe {
  position:absolute; inset:0; width:100%; height:100%; border:none; border-radius:8px;
}
.open-yt-btn {
  margin-top:16px;
  background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.4);
  color:#fff; padding:10px 24px; border-radius:50px;
  font-size:14px; font-weight:800; cursor:pointer;
  font-family:'Nunito',sans-serif;
}
